<svg viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace,monospace" font-size="13">
  <title>SimNexus Docker 网络模型</title>

  <!-- dark background -->
  <rect width="720" height="500" fill="#0d0d14"/>

  <!-- External zone -->
  <rect x="10" y="10" width="700" height="80" rx="8" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="24" y="30" font-size="11" fill="#888" font-weight="600">外部访问</text>

  <!-- Host zone -->
  <rect x="10" y="110" width="700" height="360" rx="8" fill="#1e1e2e" stroke="#333" stroke-width="1.5" opacity="0.8"/>
  <text x="24" y="133" font-size="11" fill="#888" font-weight="600">Linux 宿主机 (10.211.55.6)</text>

  <!-- Docker bridge network zone -->
  <rect x="30" y="145" width="660" height="290" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="46" y="164" font-size="11" fill="#3b82f6" font-weight="600">simnexus_default (Docker bridge 172.19.0.0/16)</text>

  <!-- Browser box -->
  <rect x="280" y="22" width="160" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1.5"/>
  <text x="360" y="40" text-anchor="middle" fill="#eee" font-weight="700">浏览器</text>
  <text x="360" y="58" text-anchor="middle" fill="#888" font-size="11">http://10.211.55.6</text>

  <!-- Arrow: Browser -> Host:80 -->
  <line x1="360" y1="66" x2="360" y2="108" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="368" y="92" fill="#888" font-size="11">:80 TCP</text>

  <!-- frontend container -->
  <rect x="180" y="175" width="200" height="100" rx="6" fill="#111" stroke="#3b82f6" stroke-width="2"/>
  <text x="280" y="198" text-anchor="middle" fill="#3b82f6" font-weight="700">simnexus-frontend</text>
  <text x="280" y="216" text-anchor="middle" fill="#aaa" font-size="11">nginx:alpine</text>
  <text x="280" y="234" text-anchor="middle" fill="#aaa" font-size="11">172.19.0.3:80</text>
  <text x="280" y="252" text-anchor="middle" fill="#888" font-size="10">0.0.0.0:80 → 容器:80</text>

  <!-- nginx detail box -->
  <rect x="185" y="260" width="190" height="46" rx="4" fill="#16161e" stroke="#333" stroke-width="1"/>
  <text x="280" y="278" text-anchor="middle" fill="#aaa" font-size="10">静态文件: /usr/share/nginx/html</text>
  <text x="280" y="293" text-anchor="middle" fill="#aaa" font-size="10">resolver 127.0.0.11 (Docker DNS)</text>
  <text x="280" y="308" text-anchor="middle" fill="#aaa" font-size="10">set $backend backend:8000</text>

  <!-- backend container -->
  <rect x="450" y="175" width="210" height="160" rx="6" fill="#111" stroke="#22c55e" stroke-width="2"/>
  <text x="555" y="198" text-anchor="middle" fill="#22c55e" font-weight="700">simnexus-backend</text>
  <text x="555" y="216" text-anchor="middle" fill="#aaa" font-size="11">FastAPI + Uvicorn</text>
  <text x="555" y="234" text-anchor="middle" fill="#aaa" font-size="11">172.19.0.2:8000</text>
  <text x="555" y="252" text-anchor="middle" fill="#888" font-size="10">不暴露端口到宿主机</text>

  <!-- backend volume mounts -->
  <rect x="455" y="262" width="200" height="64" rx="4" fill="#16161e" stroke="#333" stroke-width="1"/>
  <text x="555" y="279" text-anchor="middle" fill="#aaa" font-size="10">挂载: ./data → /app/data</text>
  <text x="555" y="294" text-anchor="middle" fill="#aaa" font-size="10">挂载: /run/dbus/system_bus_socket</text>
  <text x="555" y="309" text-anchor="middle" fill="#aaa" font-size="10">挂载: /dev/bus/usb</text>
  <text x="555" y="324" text-anchor="middle" fill="#aaa" font-size="10">privileged: true</text>

  <!-- ModemManager on host -->
  <rect x="400" y="390" width="200" height="44" rx="6" fill="#111" stroke="#eab308" stroke-width="1.5"/>
  <text x="500" y="409" text-anchor="middle" fill="#eab308" font-weight="700">ModemManager</text>
  <text x="500" y="426" text-anchor="middle" fill="#aaa" font-size="11">宿主机 systemd 服务</text>

  <!-- USB Modems -->
  <rect x="90" y="390" width="180" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="180" y="409" text-anchor="middle" fill="#ccc" font-weight="700">USB 4G 调制解调器</text>
  <text x="180" y="426" text-anchor="middle" fill="#888" font-size="11">/dev/bus/usb</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#eab308"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Browser -> frontend (port mapping) -->
  <line x1="360" y1="108" x2="310" y2="173" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- nginx -> backend proxy -->
  <line x1="380" y1="225" x2="448" y2="225" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="414" y="218" text-anchor="middle" fill="#22c55e" font-size="10">/api/ /ws/</text>
  <text x="414" y="232" text-anchor="middle" fill="#888" font-size="10">proxy_pass</text>

  <!-- backend -> D-Bus socket -->
  <line x1="555" y1="337" x2="500" y2="388" stroke="#eab308" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-yellow)"/>
  <text x="546" y="372" fill="#eab308" font-size="10">D-Bus socket</text>

  <!-- ModemManager -> USB -->
  <line x1="400" y1="412" x2="272" y2="412" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="336" y="406" text-anchor="middle" fill="#888" font-size="10">控制</text>

  <!-- backend -> USB direct -->
  <line x1="460" y1="337" x2="240" y2="388" stroke="#444" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <text x="310" y="368" fill="#777" font-size="10">/dev/bus/usb 挂载</text>

  <!-- nginx routing table -->
  <rect x="30" y="355" width="330" height="72" rx="5" fill="#16161e" stroke="#333" stroke-width="1"/>
  <text x="46" y="372" fill="#aaa" font-size="10" font-weight="600">nginx 路由规则</text>
  <text x="46" y="389" fill="#888" font-size="10">GET /           → 静态文件 dist/index.html</text>
  <text x="46" y="404" fill="#60a5fa" font-size="10">GET /api/*      → proxy_pass http://$backend (172.19.0.2:8000)</text>
  <text x="46" y="419" fill="#4ade80" font-size="10">WS  /ws/*       → proxy_pass http://$backend (升级协议)</text>
</svg>
